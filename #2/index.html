<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>El Progreso — Iniciar sesión</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-image:url(img/Fondo.jpg);
      background-position: 50%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      display: flex;
      width: 860px;
      min-height: 520px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
      background: #fff;
      position: relative;
    }

    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 10px;
      background: #0D2252;
      z-index: 10;
    }

    /* ── Panel izquierdo ── */
    .left-panel {
      width: 42%;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      border-right: 1px solid #e0e0e0;
      padding: 60px 32px 0 32px;
    }

    .left-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex: 1;
      justify-content: center;
    }

    .cube-logo {
      width: 90px;
      height: 90px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 600;
      color: #0D2252;
      letter-spacing: 4px;
      text-align: center;
    }

    .orange-band {
      width: 100%;
      background: #FF6B1A;
      height: 72px;
      flex-shrink: 0;
    }

    /* ── Panel derecho ── */
    .right-panel {
      width: 58%;
      padding: 60px 48px 40px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #fff;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }

    .field-group label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }

    .field-group input {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 14px;
      color: #111827;
      outline: none;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-group input:focus {
      border-color: #1D6ECC;
      box-shadow: 0 0 0 3px rgba(29,110,204,0.15);
    }

    .row-check {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #6b7280;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #1D6ECC;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 13px;
      color: #1D6ECC;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #1D6ECC;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #1558A8; }

    .btn-google {
      width: 100%;
      padding: 10px;
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 22px;
      transition: background 0.15s;
    }

    .btn-google:hover { background: #f9fafb; }

    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .signup-text {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
    }

    .signup-text a {
      color: #1D6ECC;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-text a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="top-bar"></div>

  <!-- Panel izquierdo -->
  <div class="left-panel">
    <div class="left-content">
      <svg class="cube-logo" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="45,8 78,26 78,62 45,80 12,62 12,26" fill="#0D2252"/>
        <polygon points="45,8 78,26 45,44 12,26" fill="#1A3A7A"/>
        <polygon points="45,44 78,26 78,62 45,80" fill="#0D2252"/>
        <polygon points="45,44 12,26 12,62 45,80" fill="#0A1C45"/>
        <polygon points="55,18 72,28 55,38 38,28" fill="#FF6B1A"/>
        <polygon points="55,38 72,28 72,48 55,58" fill="#E05510"/>
        <polygon points="55,38 38,28 38,48 55,58" fill="#FF8C42"/>
      </svg>
      <p class="brand-name">EL PROGRESO</p>
    </div>
    <div class="orange-band"></div>
  </div>

  <!-- Panel derecho -->
  <div class="right-panel">
    <h1 class="login-title">Inicia sesión en tu cuenta</h1>
    <p class="login-sub">¡Bienvenido de nuevo! Por favor, ingresa tus datos.</p>

    <div class="field-group">
      <label for="email">Correo</label>
      <input type="email" id="email" placeholder="Ingresa tu correo" autocomplete="email"/>
    </div>

    <div class="field-group">
      <label for="pass">Contraseña</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <div class="row-check">
      <label class="remember">
        <input type="checkbox" id="remember"/>
        Recordar por 30 días
      </label>
      <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn-primary">Iniciar sesión</button>

    <button class="btn-google">
      <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Iniciar sesión con Google
    </button>

    <p class="signup-text">¿No tienes una cuenta? <a href="Registro.html">Registrarse</a></p>
  </div>
</div>

</body>
</html>
