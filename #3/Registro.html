<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Progreso — Registrarse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="contenedor-registro">
  <div class="barra-superior"></div>

  <!-- Panel izquierdo -->
  <div class="panel-izquierdo">
    <div class="contenido-izquierdo">
      <img src="img/logo.png" alt="Logo" class="logo-cubo">
      <p class="nombre-marca">EL PROGRESO</p>
    </div>
    <div class="banda-naranja"></div>
  </div>

  <!-- Panel derecho -->
  <div class="panel-derecho-registro">
    <h1 class="titulo-registro">Crea tu cuenta</h1>
    <p class="subtitulo-registro">¡Únete a nosotros! Completa los siguientes datos para registrarte.</p>

    <form action="MenuPrincipal.html" method="GET">
      <div class="fila-dos">
        <div class="grupo-campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
        </div>
        <div class="grupo-campo">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
        </div>
      </div>

      <div class="grupo-campo">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
      </div>

      <div class="fila-dos">
        <div class="grupo-campo">
          <label for="contrasena">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>
        </div>
        <div class="grupo-campo">
          <label for="confirmar_contrasena">Confirmar contraseña</label>
          <input type="password" id="confirmar_contrasena" name="confirmar_contrasena" placeholder="••••••••" required>
        </div>
      </div>

      <div class="grupo-campo">
        <label for="telefono">Teléfono <span class="opcional">(opcional)</span></label>
        <input type="tel" id="telefono" name="telefono" placeholder="+57 300 000 0000">
      </div>

      <label class="terminos">
        <input type="checkbox" name="terminos" required>
        Acepto los <a href="#">Términos y condiciones</a> y la <a href="#">Política de privacidad</a>
      </label>

      <button type="submit" class="boton-primario">Crear cuenta</button>
    </form>

    <div class="divisor">o regístrate con</div>

    <a href="MenuPrincipal.html" class="boton-google">
      <svg class="icono-google" viewBox="0 0 18 18">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Registrarse con Google
    </a>

    <p class="texto-inicio">¿Ya tienes una cuenta? <a href="index.html">Iniciar sesión</a></p>
  </div>
</div>

</body>
</html>
