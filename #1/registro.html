<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="/css/estilos.css">
</head>

<body class="bg">

<header>
    <div class="header-left">
        <img src="/img/logo-sin.png" class="logo">
        <h2>Registro</h2>
    </div>
</header>

<div class="container">
<div class="content">

    <div class="panel">
        <h2>Llene los recuadros requeridos</h2>
        <br>
        <form action="index.html">
            <h4>Ingrese su Usuario</h4>
            <input type="text" placeholder="Usuario" required>
            <h4>Ingrese Nombres</h4>
            <input type="text" placeholder="Nombres" required>
            <h4>Ingrese Apellidos</h4>
            <input type="text" placeholder="Apellidos" required>
            <h4>Ingrese Numero de Celular</h4>
            <input type="Number" placeholder="Celular" required>
            <h4>Ingrese Correo</h4>
            <input type="email" placeholder="Correo" required>
            <h4>Ingrese su Fecha de Nacimiento</h4>
            <input type="date" placeholder="Fecha de Nacimiento" required>
            <h4>Ingrese su Contraseña</h4>
            <input type="password" placeholder="Contraseña" required>
            

            <div class="btn-group">
                <button class="btn btn-primary">Registrarse</button>
                <a href="index.html" class="btn btn-secondary">Volver</a>
            </div>

        </form>
    </div>

</div>
</div>

<footer>
<p>© 2026 El Progreso</p>
</footer>

</body>
</html>
